<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<div class="container mt-5">

    <h2>🚀 Dashboard</h2>

    <a href="/create-project" class="btn btn-success mt-3">+ Create Project</a>
    <a href="/logout" class="btn btn-danger mt-3">Logout</a>

    <hr>

    <h4>Your Projects</h4>

    {% if projects %}
        <ul class="list-group">
        {% for p in projects %}
            <li class="list-group-item bg-secondary text-white mt-2">
                <b>{{ p.name }}</b> - {{ p.status }}

                <br>

                {% if p.live_url %}
                    🔗 <a href="{{ p.live_url }}" target="_blank">Open App</a>
                {% endif %}

                <br><br>

                <a href="/deploy/{{ p.id }}" class="btn btn-primary btn-sm">
                    Deploy
                </a>
            </li>
        {% endfor %}
        </ul>
    {% else %}
        <p>No projects yet. Create one 🚀</p>
    {% endif %}

</div>

</body>
</html>
